[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "central-knowledge-base"
version = "0.1.0"
description = "A RAG application based on LangGraph/LangChain that consumes data from external connectors"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "TrisNol", email = "noreply@example.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.9"
dependencies = [
    "langchain>=0.1.0",
    "langgraph>=0.0.40",
    "langchain-openai>=0.1.0",
    "langchain-community>=0.0.20",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "atlassian-python-api>=3.41.0",
    "GitPython>=3.1.40",
    "pydantic>=2.5.0",
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "tiktoken>=0.5.0",
    "networkx>=3.2.1",
    "pyvis>=0.3.2",
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "mypy>=1.7.0",
    "pre-commit>=3.5.0",
]

[project.urls]
"Homepage" = "https://github.com/TrisNol/central-knowledge-base"
"Bug Tracker" = "https://github.com/TrisNol/central-knowledge-base/issues"

[project.scripts]
ckb = "central_knowledge_base.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["central_knowledge_base*"]

[tool.black]
line-length = 100
target-version = ['py39']

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true