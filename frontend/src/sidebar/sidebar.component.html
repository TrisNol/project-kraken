<aside class="sidebar">
    <div class="brand">
        <div class="logo" aria-hidden="true">📚</div>
        @if(!collapsed){
        <span class="name">CKB</span>
        }
        <button class="collapse" type="button" (click)="toggleCollapse()" aria-label="Toggle sidebar">
            <span aria-hidden="true">{{ collapsed ? '›' : '‹' }}</span>
        </button>
    </div>
    <nav class="nav">
        <a routerLink="/chat" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <span class="icon" aria-hidden="true">💬</span>
            @if(!collapsed){
            <span class="label">Chat</span>
            }
        </a>
        <a routerLink="/graph" routerLinkActive="active">
            <span class="icon" aria-hidden="true">🕸️</span>
            @if(!collapsed){
            <span class="label">Graph</span>
            }
        </a>
    </nav>

</aside>
